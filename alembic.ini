[alembic]
script_location = bot/alembic
# sqlalchemy.url is set dynamically from settings.db_url_sync in env.py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname_name = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname_name = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S